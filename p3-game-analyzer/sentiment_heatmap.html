<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Continuem — Emotion Heatmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#04040a;--ink2:#09090f;--ink3:#0f0f18;--ink4:#141420;
  --border:rgba(255,255,255,.055);--border2:rgba(255,255,255,.12);--border3:rgba(255,255,255,.18);
  --text:#d5d5e5;--muted:#44445e;
  --joy:#f5c842;--surprise:#3d8eff;--frustration:#ff3352;--awe:#ff7a2a;
  --fear:#b44fff;--sadness:#22d3ee;--disgust:#34d96a;--neutral:#6060a0;
  --pos:#00d68f;--neg:#f0364a;
  --font-d:'Bebas Neue',sans-serif;--font-m:'IBM Plex Mono',monospace;--font-b:'IBM Plex Sans',sans-serif;
  --drawer-w:390px;
}
html,body{height:100%;background:var(--ink);color:var(--text);font-family:var(--font-m);overflow:hidden;}
body::before{content:'';pointer-events:none;position:fixed;inset:0;z-index:9998;
  background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,.03) 1px,rgba(0,0,0,.03) 2px);}
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(4,4,10,.98);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;}
.nav-brand{font-family:var(--font-d);font-size:18px;letter-spacing:3px;display:flex;align-items:center;gap:9px;}
.pulse{width:6px;height:6px;border-radius:50%;animation:hb 1.8s ease-in-out infinite;}
@keyframes hb{0%,100%{opacity:1}50%{opacity:.25}}
.nav-right{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);}
.nav-tag{border:1px solid var(--border2);border-radius:2px;padding:2px 9px;text-transform:uppercase;letter-spacing:.1em;}
/* Game switcher */
.game-switcher{display:flex;gap:0;border:1px solid var(--border2);border-radius:3px;overflow:hidden;}
.gs-btn{padding:4px 12px;background:transparent;border:none;color:var(--muted);font-family:var(--font-m);font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;border-right:1px solid var(--border2);}
.gs-btn:last-child{border-right:none;}
.gs-btn:hover{color:var(--text);}
.gs-btn.active{color:var(--text);background:var(--ink3);}
.wrapper{position:fixed;inset:48px 0 0 0;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);}
.wrapper.drawer-open{right:var(--drawer-w);}
.top-bar{display:flex;align-items:center;gap:12px;padding:5px 20px;background:rgba(4,4,10,.96);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.scale-group{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.scale-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.scale-track{display:flex;height:8px;width:100px;border-radius:2px;overflow:hidden;}
.view-btns{display:flex;gap:4px;}
.vb{padding:4px 9px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:var(--font-m);font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.vb:hover{color:var(--text);}
.vb.active{color:var(--text);border-color:var(--border2);background:var(--ink3);}
.em-toggles{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;}
.em-tog{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;user-select:none;color:var(--muted);transition:color .15s;}
.em-tog:hover{color:var(--text);} .em-tog.off{opacity:.18;}
.em-tog-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.sort-bar{display:flex;align-items:center;gap:9px;padding:4px 20px;background:rgba(4,4,10,.96);border-bottom:1px solid var(--border);flex-shrink:0;}
.sort-lbl{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
.sort-btns{display:flex;gap:4px;}
.sb2{padding:3px 8px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:var(--font-m);font-size:9px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.sb2:hover{color:var(--text);} .sb2.active{color:var(--text);border-color:rgba(0,214,143,.4);background:rgba(0,214,143,.06);}
.sort-sep{width:1px;height:14px;background:var(--border);}
.filter-input{background:var(--ink2);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:var(--font-m);font-size:9px;padding:3px 9px;outline:none;width:180px;}
.filter-input:focus{border-color:var(--border2);}
.filter-input::placeholder{color:var(--muted);}
.event-count{font-size:9px;color:var(--muted);}
.canvas-area{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;cursor:crosshair;}
.stat-bar{position:fixed;bottom:0;left:0;right:0;z-index:150;display:flex;align-items:center;gap:14px;padding:0 20px;height:26px;background:rgba(4,4,10,.92);border-top:1px solid var(--border);font-size:9px;color:var(--muted);overflow:hidden;transition:right .3s cubic-bezier(.4,0,.2,1);}
.stat-bar.drawer-open{right:var(--drawer-w);}
.sb-item{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.sb-val{color:var(--text);} .sb-div{width:1px;height:12px;background:var(--border);flex-shrink:0;}
/* tooltip */
.tip{position:fixed;pointer-events:none;z-index:300;background:rgba(4,4,10,.98);border:1px solid var(--border2);border-radius:3px;padding:11px 14px;font-size:10px;opacity:0;transition:opacity .1s;min-width:240px;max-width:300px;backdrop-filter:blur(14px);}
.tip-h{font-family:var(--font-d);font-size:12px;letter-spacing:1.5px;margin-bottom:4px;}
.tip-ev{font-size:10.5px;color:var(--muted);margin-bottom:7px;line-height:1.5;}
.tip-r{color:var(--muted);margin-bottom:2px;display:flex;justify-content:space-between;gap:10px;}
.tip-r span{color:var(--text);}
.tip-div{border-top:1px solid var(--border);margin:5px 0 4px;}
.tip-click{font-size:8.5px;color:var(--muted);margin-top:7px;display:flex;align-items:center;gap:5px;}
.tip-click-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.tip-br{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.tip-br-dot{width:5px;height:5px;border-radius:2px;flex-shrink:0;}
.tip-br-lbl{font-size:8.5px;color:var(--muted);min-width:64px;}
.tip-br-track{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.tip-br-fill{height:100%;border-radius:2px;}
.tip-br-pct{font-size:8.5px;min-width:26px;text-align:right;}
/* DRAWER */
.drawer{position:fixed;top:48px;right:0;bottom:0;width:var(--drawer-w);background:var(--ink2);border-left:1px solid var(--border2);z-index:190;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.drawer.open{transform:translateX(0);}
.dr-head{flex-shrink:0;padding:14px 16px 12px;border-bottom:1px solid var(--border);background:var(--ink3);position:relative;}
.dr-close{position:absolute;top:12px;right:14px;width:22px;height:22px;border-radius:50%;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--font-b);}
.dr-close:hover{color:var(--text);border-color:var(--border2);background:var(--ink4);}
.dr-eyebrow{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.dr-title{font-family:var(--font-d);font-size:14px;letter-spacing:1.5px;line-height:1.35;margin-bottom:6px;}
.dr-meta{display:flex;flex-wrap:wrap;gap:7px;font-size:8.5px;color:var(--muted);}
.dr-meta-tag{display:flex;align-items:center;gap:3px;}
.dr-meta-val{color:var(--text);}
.dr-em-bars{margin-top:10px;}
.dr-em-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.dr-em-dot{width:5px;height:5px;border-radius:2px;flex-shrink:0;}
.dr-em-lbl{font-size:8.5px;color:var(--muted);min-width:60px;text-transform:uppercase;}
.dr-em-track{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.dr-em-fill{height:100%;border-radius:2px;}
.dr-em-pct{font-size:8.5px;min-width:26px;text-align:right;}
/* sort row in drawer */
.dr-sort-row{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:6px 14px;border-bottom:1px solid var(--border);font-size:8.5px;color:var(--muted);}
.dr-sort-btn{padding:2px 7px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:var(--font-m);font-size:8px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .12s;}
.dr-sort-btn:hover{color:var(--text);}
.dr-sort-btn.active{color:var(--text);border-color:rgba(0,214,143,.4);background:rgba(0,214,143,.06);}
.dr-body{flex:1;overflow-y:auto;padding:10px 0;}
.dr-body::-webkit-scrollbar{width:3px;}
.dr-body::-webkit-scrollbar-thumb{background:var(--border2);}
.dr-section-lbl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:6px 14px 4px;border-bottom:1px solid var(--border);}
.cr-card{border-bottom:1px solid var(--border);padding:10px 14px;transition:background .1s;}
.cr-card:hover{background:rgba(255,255,255,.02);}
.cr-card.highlighted{background:rgba(255,255,255,.035);border-left:2px solid;}
.cr-card.no-data-card{opacity:.4;}
.cr-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.cr-card-name{font-size:9.5px;letter-spacing:.05em;color:var(--text);}
.cr-card-score{font-family:var(--font-m);font-size:9.5px;font-weight:500;}
.cr-sent-bar{height:2px;border-radius:1px;margin-bottom:6px;background:rgba(255,255,255,.04);position:relative;}
.cr-sent-fill{height:100%;border-radius:1px;position:absolute;}
.cr-card-chips{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.cr-chip{font-size:8px;padding:2px 6px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;}
.cr-chip-n{color:var(--muted);}
.cr-samples{display:flex;flex-direction:column;gap:3px;}
.cr-sample{font-size:9.5px;color:rgba(180,180,210,.6);line-height:1.55;padding:5px 7px;background:rgba(255,255,255,.02);border-radius:2px;border-left:2px solid rgba(255,255,255,.06);}
.cr-no-data-label{font-size:8.5px;color:var(--muted);font-style:italic;}
/* dom rank badge */
.cr-rank-badge{display:inline-flex;align-items:center;gap:3px;font-size:7.5px;padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.06em;}
</style>
</head>
<body>
<nav>
  <div class="nav-brand"><div class="pulse" id="nav-pulse"></div>SENTIMENT ENGINE <span style="font-family:var(--font-b);font-size:11px;letter-spacing:1px;color:var(--muted);font-weight:300;text-transform:none">— game reaction aggregator</span></div>
  <div class="nav-right">
    <div class="game-switcher">
      <button class="gs-btn active" id="gs-sw98" onclick="switchGame('sw98',this)">She Was 98</button>
      <button class="gs-btn" id="gs-poppy" onclick="switchGame('poppy',this)">Poppy Playtime Ch.5</button>
    </div>
    <span class="nav-tag" id="nav-ev-tag"></span>
    <span class="nav-tag" id="nav-res-tag">30s Resolution</span>
  </div>
</nav>
<div class="wrapper" id="wrapper">
  <div class="top-bar">
    <div class="scale-group">
      <span class="scale-lbl">Cell intensity</span>
      <div class="scale-track" id="scale-track"></div>
    </div>
    <div class="view-btns">
      <button class="vb active" id="vb-heat" onclick="setView('heat',this)">Emotion Heatmap</button>
      <button class="vb" id="vb-sent" onclick="setView('sent',this)">Sentiment Bars</button>
      <button class="vb" id="vb-cr"   onclick="setView('cr',this)">Creator Grid</button>
    </div>
    <div class="em-toggles" id="em-toggles"></div>
  </div>
  <div class="sort-bar">
    <span class="sort-lbl">Sort events</span>
    <div class="sort-btns">
      <button class="sb2 active" id="sb-chron"      onclick="sortBy('chron',this)">Chronological</button>
      <button class="sb2" id="sb-reactivity"        onclick="sortBy('reactivity',this)">Reactivity ↓</button>
      <button class="sb2" id="sb-sentiment"         onclick="sortBy('sentiment',this)">Sentiment ↓</button>
    </div>
    <div class="sort-sep"></div>
    <span class="sort-lbl">Emotions</span>
    <div class="sort-btns">
      <button class="sb2 active" id="sb-em-fixed"   onclick="sortEm('fixed',this)">Fixed</button>
      <button class="sb2" id="sb-em-dom"            onclick="sortEm('dom',this)">Dom first</button>
    </div>
    <div class="sort-sep"></div>
    <input class="filter-input" id="filter-input" type="text" placeholder="Filter events…" oninput="filterEvents(this.value)">
    <span class="event-count" id="event-count"></span>
  </div>
  <div class="canvas-area" id="ca">
    <canvas id="cv"></canvas>
    <div class="tip" id="tip">
      <div class="tip-h" id="t-h"></div>
      <div class="tip-ev" id="t-ev"></div>
      <div class="tip-r">Section: <span id="t-sec"></span></div>
      <div class="tip-r">Bins: <span id="t-bins"></span></div>
      <div class="tip-r">Windows: <span id="t-w"></span></div>
      <div class="tip-r">Mean sentiment: <span id="t-mean"></span></div>
      <div class="tip-r">Reactivity: <span id="t-pnn"></span></div>
      <div class="tip-div"></div>
      <div id="t-bars"></div>
      <div class="tip-click"><div class="tip-click-dot" id="tip-dot"></div>Click to open data log</div>
    </div>
  </div>
  <div class="stat-bar" id="stat-bar">
    <div class="sb-item" id="stat-game" style="font-family:var(--font-d);font-size:11px;letter-spacing:2px;"></div>
    <div class="sb-div"></div>
    <div class="sb-item" id="stat-creators"></div>
    <div class="sb-div"></div>
    <div class="sb-item" id="stat-windows"></div>
    <div class="sb-div"></div>
    <div class="sb-item" id="stat-mean"></div>
    <div class="sb-div"></div>
    <div class="sb-item" id="stat-pos"></div>
    <div class="sb-div"></div>
    <div class="sb-item" id="stat-neg"></div>
    <div class="sb-div"></div>
    <div class="sb-item" id="stat-reactive"></div>
    <div class="sb-div"></div>
    <div class="sb-item" id="hover-stat" style="margin-left:auto"></div>
  </div>
</div>
<!-- DRAWER -->
<div class="drawer" id="drawer">
  <button class="dr-close" onclick="closeDrawer()">×</button>
  <div class="dr-head" id="dr-head">
    <div class="dr-eyebrow" id="dr-eyebrow"></div>
    <div class="dr-title" id="dr-title"></div>
    <div class="dr-meta" id="dr-meta"></div>
    <div class="dr-em-bars" id="dr-em-bars"></div>
  </div>
  <div class="dr-sort-row">
    <span style="color:var(--muted);font-size:8px;letter-spacing:.1em;text-transform:uppercase">Sort creators</span>
    <button class="dr-sort-btn active" id="ds-dom"   onclick="setDrawerSort('dom',this)">Dom emotion ↓</button>
    <button class="dr-sort-btn" id="ds-score"        onclick="setDrawerSort('score',this)">Score ↓</button>
    <button class="dr-sort-btn" id="ds-windows"      onclick="setDrawerSort('windows',this)">Windows ↓</button>
  </div>
  <div class="dr-body" id="dr-body"></div>
</div>
<script>
const EVENTS=[
  {"label":"Game Intro — Grandma Glimpsed Through Window","short":"Grandma Glimpsed Through Window","sec":"Arrival","bins":"0–1","bs":0,"be":1,"w":65,"mean":0.04,"pp":1.0,"pn":-0.8,"pnn":78.5,"dom":"frustration","pv":21.5,"em":{"joy":13.8,"surprise":16.9,"frustration":21.5,"awe":4.6,"fear":15.4,"disgust":6.2,"neutral":21.5}},

/* ════ INIT ════════════════════════════════════════════════════════════════ */
function initGame(){
  G=GAMES[currentGame];
  const acc=G.accentRgb;
  // Nav accent
  document.getElementById("nav-pulse").style.cssText=`background:rgb(${acc});box-shadow:0 0 10px rgb(${acc})`;
  document.getElementById("nav-ev-tag").textContent=`${G.n_events} Events`;
  document.getElementById("nav-ev-tag").style.cssText=`border:1px solid rgba(${acc},.5);color:rgb(${acc});border-radius:2px;padding:2px 9px;text-transform:uppercase;letter-spacing:.1em`;
  // Scale bar
  const t=document.getElementById("scale-track");t.innerHTML="";
  for(let i=0;i<=28;i++){const s=document.createElement("div");s.style.cssText=`flex:1;height:8px;background:rgba(${acc},${i/28*0.9})`;t.appendChild(s);}
  // Stat bar
  document.getElementById("stat-game").textContent=G.title.toUpperCase();
  document.getElementById("stat-game").style.color=`rgb(${acc})`;
  document.getElementById("stat-creators").innerHTML=`${G.n_creators} <span class="sb-val">creators</span>`;
  document.getElementById("stat-windows").innerHTML=`${G.n_windows.toLocaleString()} <span class="sb-val">windows</span>`;
  const mc=G.mean>0.05?"#00d68f":G.mean<-0.05?"#f0364a":"#888";
  document.getElementById("stat-mean").innerHTML=`mean <span class="sb-val" style="color:${mc}">${G.mean>=0?"+":""}${G.mean}</span>`;
  document.getElementById("stat-pos").innerHTML=`positive <span class="sb-val">${G.pct_pos}%</span>`;
  document.getElementById("stat-neg").innerHTML=`negative <span class="sb-val">${G.pct_neg}%</span>`;
  document.getElementById("stat-reactive").innerHTML=`most reactive <span class="sb-val" style="color:rgba(${acc},.9)">${G.most_reactive.split(" — ").pop()} ${G.most_reactive_pnn}%</span>`;
  // Tooltip dot
  document.getElementById("tip-dot").style.background=`rgb(${acc})`;
  // Filter / count
  filterStr=""; document.getElementById("filter-input").value="";
  updateEventCount();
  activeEvIdx=null;activeCrIdx=null;activeEm=null;
}

function updateEventCount(){
  const n=getSorted().length;
  document.getElementById("event-count").textContent=`${n} event${n===1?"":"s"}`;
}

// Em toggles (built once, shared)
(()=>{
  const w=document.getElementById("em-toggles");
  EMOS.forEach(em=>{
    const d=document.createElement("div");d.className="em-tog";d.dataset.em=em;
    d.innerHTML=`<div class="em-tog-dot" style="background:${COL[em]}"></div>${em}`;
    d.onclick=()=>{if(hidden.has(em)){hidden.delete(em);d.classList.remove("off");}else{hidden.add(em);d.classList.add("off");}draw();};
    w.appendChild(d);
  });
})();

/* ════ GAME SWITCH ════════════════════════════════════════════════════════ */
function switchGame(id,btn){
  if(currentGame===id)return;
  currentGame=id;G=GAMES[id];
  document.querySelectorAll(".gs-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(drawerOpen)closeDrawer();
  initGame();
  draw();
}

const cv=document.getElementById("cv"),area=document.getElementById("ca"),tip=document.getElementById("tip");
let W,H, LPAD=138, RPAD=14, TPAD=44,
    BPAD=55;   // number labels + event title strip

function resize(){
  const dpr=window.devicePixelRatio||1,r=area.getBoundingClientRect();
  W=r.width;H=r.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+"px";cv.style.height=H+"px";
  cv.getContext("2d").scale(dpr,dpr);
  draw();
}
window.addEventListener("resize",resize);

function normToAlpha(n){return 0.05+Math.min(n,1)**2*0.89;}

function getSorted(){
  const q=filterStr.toLowerCase();
  const base=G.events.map((_,i)=>i).filter(i=>
    !q||G.events[i].label.toLowerCase().includes(q)||G.events[i].sec.toLowerCase().includes(q));
  if(sortMode==="chron")     return base;
  if(sortMode==="reactivity")return[...base].sort((a,b)=>G.events[b].pnn-G.events[a].pnn);
  if(sortMode==="sentiment") return[...base].sort((a,b)=>G.events[b].mean-G.events[a].mean);
  return base;
}

/* ════ DRAW HELPERS ══════════════════════════════════════════════════════ */
function secRgb(sec){return G.sec_rgb[sec]||"180,180,180";}

function drawSectionBands(ctx,sorted,evW){
  let cur=null,cs=0;const runs=[];
  sorted.forEach((i,ci)=>{const s=G.events[i].sec;if(s!==cur){if(cur)runs.push({sec:cur,s:cs,e:ci-1});cur=s;cs=ci;}});
  if(cur)runs.push({sec:cur,s:cs,e:sorted.length-1});
  runs.forEach(run=>{
    const x1=LPAD+run.s*evW,x2=LPAD+(run.e+1)*evW,mid=(x1+x2)/2;
    const rgb=secRgb(run.sec);
    ctx.fillStyle=`rgba(${rgb},.08)`;ctx.fillRect(x1,0,x2-x1,TPAD);
    ctx.fillStyle=`rgba(${rgb},.7)`;ctx.fillRect(x1,TPAD-2,x2-x1,2);
    if(run.s>0){ctx.fillStyle=`rgba(${rgb},.2)`;ctx.fillRect(x1-1,0,1,TPAD);}
    ctx.font="bold 7.5px IBM Plex Mono";ctx.textAlign="center";
    ctx.fillStyle=`rgba(${rgb},.8)`;
    const lbl=run.sec.toUpperCase(),tw=ctx.measureText(lbl).width;
    if(tw<x2-x1-4)ctx.fillText(lbl,mid,TPAD/2+3.5);
  });
}

function drawXLabels(ctx,sorted,evW,gridBottom){
  /* X-axis: show event number only (1-indexed, sorted position).
     A single "Event N — Title" line is drawn below all numbers. */
  const numY  = gridBottom + 15;   // number baseline
  const tickY1= gridBottom + 1;
  const tickY2= gridBottom + 6;

  sorted.forEach((evIdx,ci)=>{
    const ev=G.events[evIdx];
    const cx=LPAD+ci*evW+evW/2;
    const rgb=secRgb(ev.sec);
    const isActive=activeEvIdx===evIdx;
    const isHov=hovCell&&hovCell.evIdx===evIdx;

    // Tick mark
    ctx.strokeStyle=isActive||isHov?`rgba(${rgb},.7)`:`rgba(${rgb},.25)`;
    ctx.lineWidth=isActive?1.5:1;
    ctx.beginPath();ctx.moveTo(cx,tickY1);ctx.lineTo(cx,tickY2);ctx.stroke();

    // Number
    const numStr=String(ci+1);
    const fs=Math.min(9,Math.max(7,evW*.7));
    ctx.font=`${isActive?"bold ":""}${fs}px IBM Plex Mono`;
    ctx.textAlign="center";
    ctx.fillStyle=isActive?`rgb(${rgb})`:(isHov?`rgba(${rgb},.95)`:`rgba(${rgb},.60)`);
    if(isActive){ctx.shadowColor=`rgba(${rgb},.5)`;ctx.shadowBlur=5;}
    ctx.fillText(numStr,cx,numY);
    ctx.shadowBlur=0;
  });

  // ── Event title strip ─────────────────────────────────────────────
  // Show "Event N — Full Title" for hovered or active event
  const titleY = gridBottom + 36;
  const focusIdx = (hovCell&&hovCell.evIdx!==null) ? hovCell.evIdx
                 : activeEvIdx;

  if(focusIdx!==null){
    const ev=G.events[focusIdx];
    const rgb=secRgb(ev.sec);
    // find sorted position
    const pos=sorted.indexOf(focusIdx);
    const num=pos>=0?pos+1:"–";
    const titleStr=`Event ${num}  —  ${ev.label}`;

    // background pill
    ctx.font="bold 10px IBM Plex Mono";
    const tw=ctx.measureText(titleStr).width;
    const px=Math.max(LPAD, Math.min(LPAD+(W-LPAD-RPAD)/2-tw/2-12, W-RPAD-tw-24));
    ctx.fillStyle="rgba(4,4,10,.82)";
    roundRect(ctx,px-2,titleY-12,tw+28,17,3);
    ctx.fill();
    ctx.strokeStyle=`rgba(${rgb},.35)`;ctx.lineWidth=1;
    roundRect(ctx,px-2,titleY-12,tw+28,17,3);ctx.stroke();

    // "Event N" in accent colour
    const prefix=`Event ${num}  — `;
    const prefixW=ctx.measureText(prefix).width;
    ctx.fillStyle=`rgba(${rgb},.95)`;
    ctx.textAlign="left";
    ctx.fillText(prefix,px+12,titleY);

    // Title in muted white
    ctx.font="10px IBM Plex Mono";
    ctx.fillStyle="rgba(210,210,230,.80)";
    ctx.fillText(ev.label,px+12+prefixW,titleY);
  } else {
    // Default hint
    ctx.font="8.5px IBM Plex Mono";
    ctx.textAlign="center";
    ctx.fillStyle="rgba(68,68,94,.45)";
    ctx.fillText("Hover or click an event to see its title",LPAD+(W-LPAD-RPAD)/2,titleY);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

/* ════ MAIN DRAW ════════════════════════════════════════════════════════ */
function draw(){
  const ctx=cv.getContext("2d");ctx.clearRect(0,0,W,H);
  const sorted=getSorted(),N=sorted.length;
  if(N===0){
    ctx.font="12px IBM Plex Mono";ctx.fillStyle="#44445e";ctx.textAlign="center";
    ctx.fillText("No events match filter",W/2,H/2);return;
  }
  const gW=W-LPAD-RPAD,evW=gW/N;

  if(viewMode==="heat"){
    const visEm=EMOS.filter(e=>!hidden.has(e)),nEm=visEm.length;
    if(nEm===0)return;
    const emH=(H-TPAD-BPAD)/nEm*0.8,gridBottom=TPAD+nEm*emH;
    drawSectionBands(ctx,sorted,evW);
    // Active column bg
    if(activeEvIdx!==null){
      const ai=sorted.indexOf(activeEvIdx);
      if(ai>=0){
        const ax=LPAD+ai*evW,acc=G.accentRgb;
        ctx.fillStyle=`rgba(${acc},.07)`;ctx.fillRect(ax,TPAD,evW,nEm*emH);
        ctx.strokeStyle=`rgba(${acc},.4)`;ctx.lineWidth=1.5;
        ctx.strokeRect(ax+.75,TPAD+.75,evW-1.5,nEm*emH-1.5);
      }
    }
    visEm.forEach((em,ei)=>{
      const y=TPAD+ei*emH;
      if(ei%2===0){ctx.fillStyle="rgba(255,255,255,.01)";ctx.fillRect(LPAD,y,gW,emH);}
      ctx.fillStyle=COL[em];ctx.fillRect(LPAD-6,y+3,3,emH-6);
      ctx.font="bold 9.5px IBM Plex Mono";ctx.textAlign="right";ctx.fillStyle=COL[em];
      ctx.fillText(em.toUpperCase(),LPAD-12,y+emH/2+4);
      ctx.fillStyle="rgba(4,4,10,.6)";ctx.fillRect(LPAD,y+emH-.5,gW,1);
    });
    sorted.forEach((evIdx,ci)=>{
      const ev=G.events[evIdx],x=LPAD+ci*evW;
      visEm.forEach((em,ei)=>{
        const y=TPAD+ei*emH,v=ev.em[em]||0;if(v<=0)return;
        const norm=v/ev.pv,fa=normToAlpha(norm);
        ctx.fillStyle=`rgba(${RGB[em]},${fa})`;ctx.fillRect(x+.5,y+.5,evW-1,emH-1);
        if(em===ev.dom){ctx.fillStyle=`rgba(${RGB[em]},${Math.min(1,fa*1.6)})`;ctx.fillRect(x+.5,y+.5,evW-1,3);}
        if(hovCell&&hovCell.evIdx===evIdx&&hovCell.em===em){
          ctx.fillStyle="rgba(255,255,255,.14)";ctx.fillRect(x+.5,y+.5,evW-1,emH-1);
          ctx.strokeStyle="rgba(255,255,255,.7)";ctx.lineWidth=1.5;ctx.strokeRect(x+1,y+1,evW-2,emH-2);
        }
        if(evW>18&&emH>16&&fa>0.25){
          ctx.font=`bold ${Math.min(9,Math.max(6,emH*.28))}px IBM Plex Mono`;
          ctx.textAlign="center";ctx.fillStyle=`rgba(255,255,255,${Math.min(.9,fa)})`;
          ctx.fillText(v.toFixed(0)+"%",x+evW/2,y+emH/2+3.5);
        }
      });
      ctx.strokeStyle="rgba(4,4,10,.5)";ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(x+evW,TPAD);ctx.lineTo(x+evW,gridBottom);ctx.stroke();
    });
    drawXLabels(ctx,sorted,evW,gridBottom);
  }

  else if(viewMode==="sent"){
    const chartH=H-TPAD-BPAD,midY=TPAD+chartH/2,halfH=chartH*.45,gridBottom=TPAD+chartH;
    drawSectionBands(ctx,sorted,evW);
    if(activeEvIdx!==null){const ai=sorted.indexOf(activeEvIdx);if(ai>=0){const ax=LPAD+ai*evW,acc=G.accentRgb;ctx.fillStyle=`rgba(${acc},.07)`;ctx.fillRect(ax,TPAD,evW,chartH);ctx.strokeStyle=`rgba(${acc},.4)`;ctx.lineWidth=1.5;ctx.strokeRect(ax+.75,TPAD+.75,evW-1.5,chartH-1.5);}}
    ctx.strokeStyle="rgba(255,255,255,.07)";ctx.lineWidth=1;ctx.setLineDash([3,7]);
    ctx.beginPath();ctx.moveTo(LPAD,midY);ctx.lineTo(LPAD+gW,midY);ctx.stroke();ctx.setLineDash([]);
    ctx.font="8px IBM Plex Mono";ctx.textAlign="right";ctx.fillStyle="#44445e";
    ctx.fillText("+1.0",LPAD-6,TPAD+8);ctx.fillText("0.0",LPAD-6,midY+4);ctx.fillText("−1.0",LPAD-6,gridBottom);
    sorted.forEach((evIdx,ci)=>{
      const ev=G.events[evIdx],x=LPAD+ci*evW+1,bW=evW-2;
      const barH=Math.abs(ev.mean)*halfH,pos=ev.mean>=0,yStart=pos?midY-barH:midY;
      const rgb=RGB[ev.dom]||"180,79,255";
      const nnH=(ev.pnn/100)*chartH*.82;ctx.fillStyle="rgba(255,255,255,.035)";ctx.fillRect(x,midY-nnH/2,bW,nnH);
      const grad=ctx.createLinearGradient(0,yStart,0,yStart+Math.max(barH,1));
      if(pos){grad.addColorStop(0,`rgba(${rgb},.9)`);grad.addColorStop(1,`rgba(${rgb},.12)`);}
      else{grad.addColorStop(0,`rgba(${rgb},.12)`);grad.addColorStop(1,`rgba(${rgb},.9)`);}
      ctx.fillStyle=grad;ctx.fillRect(x,yStart,bW,Math.max(2,barH));
      if(hovCell&&hovCell.evIdx===evIdx){ctx.fillStyle="rgba(255,255,255,.07)";ctx.fillRect(x,TPAD,bW,chartH);}
      if(evW>14&&barH>8){ctx.font=`${Math.min(8,Math.max(6,evW*.32))}px IBM Plex Mono`;ctx.textAlign="center";ctx.fillStyle=`rgba(${rgb},.9)`;ctx.fillText(`${pos?"+":""}${ev.mean.toFixed(2)}`,x+bW/2,pos?yStart-3:yStart+barH+9);}
      ctx.beginPath();ctx.arc(x+bW/2,pos?midY-barH-7:midY+barH+7,2.5,0,Math.PI*2);ctx.fillStyle=COL[ev.dom];ctx.fill();
    });
    drawXLabels(ctx,sorted,evW,gridBottom);
  }

  else if(viewMode==="cr"){
    const nCr=G.crgrid.length,crH=(H-TPAD-BPAD)/nCr,gridBottom=TPAD+nCr*crH;
    drawSectionBands(ctx,sorted,evW);
    if(activeEvIdx!==null){const ai=sorted.indexOf(activeEvIdx);if(ai>=0){const ax=LPAD+ai*evW,acc=G.accentRgb;ctx.fillStyle=`rgba(${acc},.07)`;ctx.fillRect(ax,TPAD,evW,nCr*crH);ctx.strokeStyle=`rgba(${acc},.4)`;ctx.lineWidth=1.5;ctx.strokeRect(ax+.75,TPAD+.75,evW-1.5,nCr*crH-1.5);}}
    G.crgrid.forEach((cr,ri)=>{
      const y=TPAD+ri*crH;
      if(ri%2===0){ctx.fillStyle="rgba(255,255,255,.01)";ctx.fillRect(LPAD,y,gW,crH);}
      if(activeCrIdx===ri){ctx.fillStyle=`rgba(${G.accentRgb},.05)`;ctx.fillRect(LPAD,y,gW,crH);}
      const oc=cr.overall>0.1?"#00d68f":cr.overall<-.05?"#f0364a":"#5a5a80";
      ctx.font=`bold ${Math.min(9,crH*.55)}px IBM Plex Mono`;ctx.textAlign="right";ctx.fillStyle=oc;
      ctx.fillText(cr.cr,LPAD-10,y+crH/2+3.5);
      ctx.font=`${Math.min(7,crH*.4)}px IBM Plex Mono`;ctx.fillStyle="#44445e";
      ctx.fillText(`${cr.overall>=0?"+":""}${cr.overall.toFixed(3)}`,LPAD-10,y+crH/2+11);
      sorted.forEach((evIdx,ci)=>{
        const x=LPAD+ci*evW,d=cr.ev[evIdx];
        if(!d){ctx.fillStyle="rgba(255,255,255,.018)";ctx.fillRect(x+.5,y+.5,evW-1,crH-1);return;}
        const rgb=RGB[d.d]||"180,79,255",t2=Math.min(Math.abs(d.m),1),alpha=0.05+t2*t2*0.75;
        ctx.fillStyle=`rgba(${rgb},${alpha})`;ctx.fillRect(x+.5,y+.5,evW-1,crH-1);
        if(hovCell&&hovCell.evIdx===evIdx){ctx.fillStyle="rgba(255,255,255,.07)";ctx.fillRect(x+.5,y+.5,evW-1,crH-1);}
        if(hovCell&&hovCell.evIdx===evIdx&&hovCell.crIdx===ri){ctx.strokeStyle="rgba(255,255,255,.7)";ctx.lineWidth=1.5;ctx.strokeRect(x+1,y+1,evW-2,crH-2);}
        if(evW>18&&crH>12){ctx.font=`${Math.min(8,crH*.52)}px IBM Plex Mono`;ctx.textAlign="center";ctx.fillStyle=`rgba(${rgb},.9)`;ctx.fillText(`${d.m>=0?"+":""}${d.m.toFixed(2)}`,x+evW/2,y+crH/2+3.5);}
      });
      ctx.fillStyle="rgba(4,4,10,.5)";ctx.fillRect(LPAD,y+crH-.5,gW,1);
    });
    sorted.forEach((_,ci)=>{const x=LPAD+(ci+1)*evW;ctx.strokeStyle="rgba(4,4,10,.4)";ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(x,TPAD);ctx.lineTo(x,TPAD+nCr*crH);ctx.stroke();});
    drawXLabels(ctx,sorted,evW,gridBottom);
  }
}

/* ════ HIT DETECTION ═════════════════════════════════════════════════════ */
function getHit(mx,my){
  const sorted=getSorted(),N=sorted.length;
  if(N===0||mx<LPAD||mx>W-RPAD||my<TPAD)return null;
  const evW=(W-LPAD-RPAD)/N,ci=Math.floor((mx-LPAD)/evW);
  if(ci<0||ci>=N)return null;
  const evIdx=sorted[ci];
  if(viewMode==="heat"){
    const visEm=EMOS.filter(e=>!hidden.has(e)),emH=(H-TPAD-BPAD)/visEm.length;
    if(my>TPAD+visEm.length*emH)return null;
    const ei=Math.floor((my-TPAD)/emH);
    if(ei>=0&&ei<visEm.length)return{evIdx,em:visEm[ei],ci,crIdx:null};
  }else if(viewMode==="sent"){
    if(my>TPAD+(H-TPAD-BPAD))return null;
    return{evIdx,em:G.events[evIdx].dom,ci,crIdx:null};
  }else if(viewMode==="cr"){
    const nCr=G.crgrid.length,crH=(H-TPAD-BPAD)/nCr;
    if(my>TPAD+nCr*crH)return null;
    const ri=Math.floor((my-TPAD)/crH);
    if(ri>=0&&ri<nCr)return{evIdx,em:null,ci,crIdx:ri};
  }
  return null;
}

/* ════ HOVER ═════════════════════════════════════════════════════════════ */
cv.addEventListener("mousemove",e=>{
  const rect=cv.getBoundingClientRect();
  const found=getHit(e.clientX-rect.left,e.clientY-rect.top);
  hovCell=found?{evIdx:found.evIdx,em:found.em,crIdx:found.crIdx}:null;
  if(found){
    const ev=G.events[found.evIdx];
    const acc=G.accentRgb,rgb=secRgb(ev.sec);
    const em=found.em,v=em?ev.em[em]||0:0;
    const scCol=ev.mean>0.1?"#00d68f":ev.mean<-.08?"#f0364a":"#888";
    document.getElementById("t-h").textContent=(em?em.toUpperCase()+" · ":"")+ev.sec.toUpperCase();
    document.getElementById("t-h").style.color=em?COL[em]:`rgb(${rgb})`;
    document.getElementById("t-ev").textContent=ev.label;
    document.getElementById("t-sec").innerHTML=`<span style="color:rgb(${rgb})">${ev.sec}</span>`;
    document.getElementById("t-bins").innerHTML=`<span>Bins ${ev.bins}</span>`;
    document.getElementById("t-w").innerHTML=`<span>${ev.w} windows</span>`;
    document.getElementById("t-mean").innerHTML=`<span style="color:${scCol}">${ev.mean>=0?"+":""}${ev.mean.toFixed(4)}</span>`;
    document.getElementById("t-pnn").innerHTML=`<span style="color:${ev.pnn>80?"#f5c842":ev.pnn>70?"#e8a020":"#888"}">${ev.pnn.toFixed(1)}% non-neutral</span>`;
    const s2=[...EMOS].sort((a,b)=>(ev.em[b]||0)-(ev.em[a]||0));
    document.getElementById("t-bars").innerHTML=
      '<div style="font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#44445e;margin-bottom:4px">Emotion breakdown</div>'+
      s2.filter(e=>(ev.em[e]||0)>0).map(e=>{const vv=ev.em[e]||0,nr=vv/ev.pv;return`
      <div class="tip-br"><div class="tip-br-dot" style="background:${COL[e]};${e===ev.dom?"box-shadow:0 0 4px "+COL[e]:""}"></div>
      <span class="tip-br-lbl" style="color:${COL[e]}">${e}${e===ev.dom?" ★":""}</span>
      <div class="tip-br-track"><div class="tip-br-fill" style="width:${Math.min(nr*100,100).toFixed(0)}%;background:${COL[e]}"></div></div>
      <span class="tip-br-pct" style="color:${COL[e]}">${vv.toFixed(1)}%</span></div>`;}).join("");
    if(found.crIdx!==null){
      const cr=G.crgrid[found.crIdx],ed=cr.ev[found.evIdx];
      const oc=cr.overall>0.1?"#00d68f":cr.overall<-.05?"#f0364a":"#888";
      document.getElementById("t-h").textContent=cr.cr.toUpperCase();
      document.getElementById("t-h").style.color=oc;
      if(ed){const cs=ed.m>0.1?"#00d68f":ed.m<-.08?"#f0364a":"#888";document.getElementById("t-mean").innerHTML=`<span style="color:${cs}">${ed.m>=0?"+":""}${ed.m.toFixed(4)} · ${ed.n} windows</span>`;}
    }
    tip.style.borderColor=(em?COL[em]:`rgb(${rgb})`)+"44";
    const maxR=drawerOpen?window.innerWidth-400-10:window.innerWidth-10;
    tip.style.left=Math.min(e.clientX+14,maxR-270)+"px";
    tip.style.top=Math.max(e.clientY-110,55)+"px";
    tip.style.opacity="1";
    const sg=ev.mean>=0?"+":"";
    document.getElementById("hover-stat").innerHTML=
      `<span style="color:rgb(${rgb})">${ev.short}</span> · mean ${sg}${ev.mean.toFixed(3)} · non-neu ${ev.pnn.toFixed(0)}% · dom <span style="color:${COL[ev.dom]}">${ev.dom}</span>`;
  }else{tip.style.opacity="0";document.getElementById("hover-stat").textContent="";}
  draw();
});
cv.addEventListener("mouseleave",()=>{hovCell=null;tip.style.opacity="0";draw();});

/* ════ CLICK → DRAWER ═══════════════════════════════════════════════════ */
cv.addEventListener("click",e=>{
  const rect=cv.getBoundingClientRect();
  const found=getHit(e.clientX-rect.left,e.clientY-rect.top);
  if(!found){closeDrawer();return;}
  if(drawerOpen&&activeEvIdx===found.evIdx&&(found.crIdx===null||found.crIdx===activeCrIdx)&&found.em===activeEm){
    closeDrawer();return;
  }
  activeEvIdx=found.evIdx;activeCrIdx=found.crIdx;activeEm=found.em;
  openDrawer();
});

/* ════ DRAWER ════════════════════════════════════════════════════════════ */
function openDrawer(){
  drawerOpen=true;
  document.getElementById("drawer").classList.add("open");
  document.getElementById("wrapper").classList.add("drawer-open");
  document.getElementById("stat-bar").classList.add("drawer-open");
  renderDrawer();draw();
}
function closeDrawer(){
  drawerOpen=false;activeEvIdx=null;activeCrIdx=null;activeEm=null;
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("wrapper").classList.remove("drawer-open");
  document.getElementById("stat-bar").classList.remove("drawer-open");
  draw();
}
function setDrawerSort(mode,btn){
  drawerSort=mode;
  document.querySelectorAll(".dr-sort-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(activeEvIdx!==null)renderDrawer();
}

function renderDrawer(){
  const evIdx=activeEvIdx;
  const ev=G.events[evIdx];
  const rgb=secRgb(ev.sec);
  const acc=G.accentRgb;
  const scCol=ev.mean>0.1?"#00d68f":ev.mean<-.08?"#f0364a":"#888";

  document.getElementById("dr-eyebrow").textContent=`${ev.sec.toUpperCase()} · BINS ${ev.bins} · ${G.title.toUpperCase()}`;
  const titleEl=document.getElementById("dr-title");
  titleEl.textContent=ev.label;titleEl.style.color=`rgb(${rgb})`;

  document.getElementById("dr-meta").innerHTML=
    `<div class="dr-meta-tag">Mean <span class="dr-meta-val" style="color:${scCol}">${ev.mean>=0?"+":""}${ev.mean.toFixed(4)}</span></div>
     <div class="dr-meta-tag">Reactivity <span class="dr-meta-val" style="color:${ev.pnn>80?"#f5c842":"#888"}">${ev.pnn}%</span></div>
     <div class="dr-meta-tag">Windows <span class="dr-meta-val">${ev.w}</span></div>
     <div class="dr-meta-tag">Dom <span class="dr-meta-val" style="color:${COL[ev.dom]}">${ev.dom}</span></div>`;

  const sortedEm=[...EMOS].sort((a,b)=>(ev.em[b]||0)-(ev.em[a]||0)).filter(e=>(ev.em[e]||0)>0);
  document.getElementById("dr-em-bars").innerHTML=
    sortedEm.map(e=>{const v=ev.em[e]||0,nr=v/ev.pv;return`
    <div class="dr-em-row">
      <div class="dr-em-dot" style="background:${COL[e]};${e===ev.dom?"box-shadow:0 0 3px "+COL[e]:""}"></div>
      <span class="dr-em-lbl" style="color:${COL[e]}">${e}${e===ev.dom?" ★":""}</span>
      <div class="dr-em-track"><div class="dr-em-fill" style="width:${Math.min(nr*100,100).toFixed(1)}%;background:${COL[e]}"></div></div>
      <span class="dr-em-pct" style="color:${COL[e]}">${v.toFixed(1)}%</span>
    </div>`;}).join("");

  // Build creator cards
  const logRow=G.logs[evIdx];
  const nCr=G.crgrid.length;
  const crOrder=[...Array(nCr).keys()];

  // Dominant emotion for sorting — prefer activeEm (clicked cell emotion), else event dom
  const pivotEm = activeEm || ev.dom;

  // Emotion rank: for each creator, rank of pivotEm in their emission profile for this event
  function crEmRank(crIdx){
    const d=logRow[crIdx];
    if(!d)return 99;
    // sorted emotions for this creator×event by descending count
    const sorted2=[...EMOS].sort((a,b)=>{
      // We don't have per-emotion breakdown in LOGS, only d.d (dominant)
      // Use d.d as rank 0, everything else rank 1
      if(d.d===pivotEm)return d.d===a?-1:(d.d===b?1:0);
      return a===pivotEm?-1:(b===pivotEm?1:0);
    });
    return d.d===pivotEm?0:1;
  }

  crOrder.sort((a,b)=>{
    const da=logRow[a],db=logRow[b];
    // Always put 'no data' last
    if(!da&&!db)return 0;if(!da)return 1;if(!db)return-1;
    if(drawerSort==="dom"){
      const ra=crEmRank(a),rb=crEmRank(b);
      if(ra!==rb)return ra-rb;
      return Math.abs(db.m)-Math.abs(da.m);
    }
    if(drawerSort==="score") return Math.abs(db.m)-Math.abs(da.m);
    if(drawerSort==="windows") return db.n-da.n;
    return 0;
  });

  // Put focus creator first (if Creator Grid was clicked)
  if(activeCrIdx!==null){
    crOrder.splice(crOrder.indexOf(activeCrIdx),1);
    crOrder.unshift(activeCrIdx);
  }

  const body=document.getElementById("dr-body");
  body.innerHTML=`<div class="dr-section-lbl">${nCr} creators · ${ev.w} total windows · sorted by ${drawerSort==="dom"?`${pivotEm} dominant`:drawerSort}</div>`;

  crOrder.forEach(crIdx=>{
    const cr=G.crgrid[crIdx];
    const d=logRow[crIdx];
    const isFocus=activeCrIdx===crIdx;
    const card=document.createElement("div");
    card.className="cr-card"+(isFocus?" highlighted":"")+(d?"":" no-data-card");
    if(isFocus)card.style.cssText+=`border-left-color:rgb(${acc});`;

    if(!d){
      card.innerHTML=`<div class="cr-card-head"><span class="cr-card-name">${cr.cr}</span><span style="font-size:8.5px;color:var(--muted)">no windows in event</span></div>`;
      body.appendChild(card);return;
    }

    const scCol2=d.m>0.1?"#00d68f":d.m<-.08?"#f0364a":"#888";
    const barPct=Math.abs(d.m)*50;
    const barColor=d.m>=0?"rgba(0,214,143,.5)":"rgba(240,54,74,.5)";
    const barLeft=d.m>=0?"50%":`${50-barPct}%`;
    const isDomMatch=d.d===pivotEm;

    const samplesHtml=d.s&&d.s.length>0
      ?d.s.map(s=>`<div class="cr-sample">${escHtml(s)}</div>`).join("")
      :`<div class="cr-no-data-label">No transcript samples captured</div>`;

    card.innerHTML=`
      <div class="cr-card-head">
        <span class="cr-card-name">${cr.cr}</span>
        <span class="cr-card-score" style="color:${scCol2}">${d.m>=0?"+":""}${d.m.toFixed(3)}</span>
      </div>
      <div class="cr-sent-bar">
        <div class="cr-sent-fill" style="left:${barLeft};width:${barPct}%;background:${barColor}"></div>
      </div>
      <div class="cr-card-chips">
        <span class="cr-chip" style="color:${COL[d.d]};background:${COL[d.d]}18;border:1px solid ${COL[d.d]}44">
          ${isDomMatch?"★ ":""}${d.d}
        </span>
        <span class="cr-chip cr-chip-n">${d.n} window${d.n>1?"s":""}</span>
        ${isDomMatch?`<span class="cr-rank-badge" style="background:rgba(${RGB[pivotEm]},.12);color:${COL[pivotEm]};border:1px solid ${COL[pivotEm]}33">top ${pivotEm}</span>`:""}
      </div>
      <div class="cr-samples">${samplesHtml}</div>`;
    body.appendChild(card);
  });
}

function escHtml(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ════ CONTROLS ═════════════════════════════════════════════════════════ */
function setView(v,btn){
  viewMode=v;
  document.querySelectorAll(".vb").forEach(b=>b.classList.remove("active"));btn.classList.add("active");
  const showEm=v==="heat";
  document.getElementById("em-toggles").style.opacity=showEm?"1":"0.3";
  document.getElementById("em-toggles").style.pointerEvents=showEm?"":"none";
  draw();
}
function sortBy(mode,btn){
  sortMode=mode;
  document.querySelectorAll(".sb2[id^='sb-']").forEach(b=>{if(["sb-chron","sb-reactivity","sb-sentiment"].includes(b.id))b.classList.remove("active");});
  btn.classList.add("active");draw();
}
function sortEm(mode,btn){
  emSortMode=mode;
  document.querySelectorAll(".sb2[id^='sb-em']").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");draw();
}
function filterEvents(val){
  filterStr=val.toLowerCase();
  updateEventCount();
  if(drawerOpen&&activeEvIdx!==null&&!getSorted().includes(activeEvIdx))closeDrawer();
  draw();
}

document.addEventListener("keydown",e=>{
  if(e.code==="Digit1")setView("heat",document.getElementById("vb-heat"));
  if(e.code==="Digit2")setView("sent",document.getElementById("vb-sent"));
  if(e.code==="Digit3")setView("cr",document.getElementById("vb-cr"));
  if(e.code==="Escape"){if(drawerOpen)closeDrawer();else{document.getElementById("filter-input").value="";filterEvents("");}}
});

// Boot
initGame();resize();
</script>
</body>
</html>
