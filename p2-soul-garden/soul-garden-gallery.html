 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body data-template-id="__page-root" class="min-h-screen" style="background: rgb(10, 10, 10);">

      <img class="w-full h-80 object-cover" loading="lazy" src="web/blanket-01.jpg" alt="blanket-01.jpg">
      <p class="mt-3 text-center" style="color: rgb(212, 212, 212); font-weight: 500; font-size: 16px;">blanket-01.jpg</p>

    <button type="button" class="gallery-card overflow-hidden rounded-lg text-left" data-artwork="art-5">
      <img class="w-full h-80 object-cover" loading="lazy" src="web/blanket-02.jpg" alt="blanket-02.jpg">

  </main><!-- Lightbox -->
  <div id="lightbox" class="lightbox fixed inset-0 z-50 items-center justify-center bg-black/90 overflow-y-auto p-4">
   <div class="relative max-w-5xl w-full mx-auto my-8 bg-neutral-900 rounded-xl overflow-hidden">
    <button type="button" id="lightbox-close" class="absolute top-4 right-4 z-10 text-white/70 hover:text-white"> <i data-lucide="x" style="width:28px;height:28px;"></i> </button>
    <div class="flex flex-col lg:flex-row">
     <div class="flex-shrink-0 w-full lg:w-1/2 bg-black"><img id="lightbox-img" class="w-full h-auto max-h-[60vh] object-contain" src="" alt="">
     </div>
     <div class="w-full lg:w-1/2 p-6 flex flex-col overflow-y-auto" style="max-height: calc(60vh + 2rem)">
      <h2 id="lightbox-title" class="text-xl font-bold text-neutral-100 mb-4"></h2>
      <form id="comment-form" class="mb-6">
       <label data-template-id="comment-name-label" for="comment-name" class="canva-text block mb-1 text-sm" style="color: rgb(163, 163, 163); font-weight: 400; font-style: normal; font-size: 16px;">Your Name</label> <input id="comment-name" type="text" class="w-full mb-3 px-3 py-2 rounded bg-neutral-800 text-neutral-100 border border-neutral-700 focus:outline-none focus:border-neutral-500" required=""> <label data-template-id="comment-text-label" for="comment-text" class="canva-text block mb-1 text-sm" style="color: rgb(163, 163, 163); font-weight: 400; font-style: normal; font-size: 16px;">Your Comment</label> <textarea id="comment-text" rows="3" class="w-full mb-3 px-3 py-2 rounded bg-neutral-800 text-neutral-100 border border-neutral-700 focus:outline-none focus:border-neutral-500" required=""></textarea> <button data-template-id="comment-submit-btn" type="submit" class="canva-button px-5 py-2 rounded font-semibold" style="background: rgb(225, 29, 72); color: rgb(255, 255, 255); font-weight: 600; font-style: normal; font-size: 16px;">Submit Comment</button>
      </form>
      <div id="comments-list" class="space-y-3 flex-1 overflow-y-auto"></div>
      <p id="no-comments" class="text-neutral-500 italic text-sm hidden">No comments yet. Be the first!</p>
     </div>
    </div>
   </div>
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    let allComments = [];
    let currentArtwork = null;

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxTitle = document.getElementById('lightbox-title');
    const commentsList = document.getElementById('comments-list');
    const noComments = document.getElementById('no-comments');
    const commentForm = document.getElementById('comment-form');

    // Open lightbox
    document.querySelectorAll('.gallery-card').forEach(card => {
      card.addEventListener('click', () => {
        currentArtwork = card.dataset.artwork;
        const img = card.querySelector('img');
        const title = card.querySelector('p');
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxTitle.textContent = title.textContent;
        lightbox.classList.add('active');
        renderComments();
      });
    });

    // Close lightbox
    document.getElementById('lightbox-close').addEventListener('click', () => {
      lightbox.classList.remove('active');
      currentArtwork = null;
    });
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.classList.remove('active');
        currentArtwork = null;
      }
    });

    // Render comments for current artwork
    function renderComments() {
      const filtered = allComments.filter(c => c.artwork_id === currentArtwork);
      if (filtered.length === 0) {
        commentsList.innerHTML = '';
        noComments.classList.remove('hidden');
        return;
      }
      noComments.classList.add('hidden');
      commentsList.innerHTML = filtered.map(c => `
        <div class="bg-neutral-800 rounded p-3">
          <p class="text-neutral-300 text-sm font-semibold">${escapeHtml(c.author_name)}</p>
          <p class="text-neutral-400 text-sm mt-1">${escapeHtml(c.comment_text)}</p>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // Submit comment
    commentForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentArtwork) return;
      const name = document.getElementById('comment-name').value.trim();
      const text = document.getElementById('comment-text').value.trim();
      if (!name || !text) return;

      if (allComments.length >= 999) {
        noComments.textContent = 'Comment limit reached (999). Please remove some comments first.';
        noComments.classList.remove('hidden');
        return;
      }

      const btn = commentForm.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const result = await window.dataSdk.create({
        artwork_id: currentArtwork,
        author_name: name,
        comment_text: text,
        created_at: new Date().toISOString()
      });

      btn.disabled = false;
      btn.textContent = 'Submit Comment';

      if (result.isOk) {
        commentForm.reset();
      } else {
        noComments.textContent = 'Failed to submit comment. Please try again.';
        noComments.classList.remove('hidden');
      }
    });

    // Data SDK
    const dataHandler = {
      onDataChanged(data) {
        allComments = data;
        if (currentArtwork) renderComments();
      }
    };

    (async () => {
      const res = await window.dataSdk.init(dataHandler);
      if (!res.isOk) console.error('Data SDK init failed');
    })();

    lucide.createIcons();
  </script>
