<!doctype html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abstract Art Gallery</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>
    html, body {
      height: 100% !important;
      min-height: unset !important;
      overflow: hidden !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    body {
      font-family: 'Alegreya', serif;
      background: rgb(10, 10, 10) !important;
      display: flex !important;
      flex-direction: column !important;
    }
    /* Compact header — keep full original text, just reduce space */
    #gallery-header {
      flex-shrink: 0;
      padding: 10px 20px 8px !important;
      text-align: center;
    }
    #gallery-header h1 {
      font-size: 18px !important;
      margin: 0 0 3px !important;
      padding: 0 !important;
    }
    #gallery-header p {
      font-size: 12px !important;
      margin: 0 !important;
      line-height: 1.4;
    }
    /* Grid fills remaining height */
    #gallery-main {
      flex: 1;
      min-height: 0;
      padding: 0 8px 8px !important;
      max-width: unset !important;
    }
    #gallery-main > .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr) !important;
      grid-template-rows: repeat(3, 1fr) !important;
      gap: 5px !important;
      height: 100%;
    }
    .gallery-card {
      overflow: hidden !important;
      border-radius: 5px !important;
      min-height: 0;
      position: relative;
      cursor: pointer;
    }
    .gallery-card img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
      transition: transform 0.4s ease;
    }
    .gallery-card:hover img { transform: scale(1.04); }
    /* Hide filenames — kept in DOM for JS title lookup */
    .gallery-card p { display: none !important; }
    .lightbox { display: none; }
    .lightbox.active { display: flex; }
  </style>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/telemetry_sdk.js"></script>
</head>
<body data-template-id="__page-root">

  <header id="gallery-header">
    <h1 data-template-id="gallery-title" class="canva-text font-bold" style="color: rgb(245, 245, 245); font-family: Sailors; font-weight: 400; font-style: normal;">Visual Gallery</h1>
    <p data-template-id="gallery-subtitle" class="canva-text" style="color: rgb(163, 163, 163); font-weight: 700; font-style: normal;">Based on first reactions without overthinking, click on one (or more) images and write about what comes to mind. What emotions, memory, object, person, or any thought comes to mind?</p>
  </header>

  <main id="gallery-main">
    <div class="gallery-grid">
      <button type="button" class="gallery-card" data-artwork="art-1">
        <img loading="lazy" src="web/alhambra-01.jpg" alt="alhambra-01.jpg">
        <p>alhambra-01.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-2">
        <img loading="lazy" src="web/ambition-01.jpg" alt="ambition-01.jpg">
        <p>ambition-01.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-3">
        <img loading="lazy" src="web/arctic-01.jpg" alt="arctic-01.jpg">
        <p>arctic-01.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-4">
        <img loading="lazy" src="web/blanket-01.jpg" alt="blanket-01.jpg">
        <p>blanket-01.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-5">
        <img loading="lazy" src="web/blanket-02.jpg" alt="blanket-02.jpg">
        <p>blanket-02.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-6">
        <img loading="lazy" src="web/blanket-03.jpg" alt="blanket-03.jpg">
        <p>blanket-03.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-7">
        <img loading="lazy" src="web/bloodsister-01.jpg" alt="bloodsister-01.jpg">
        <p>bloodsister-01.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-8">
        <img loading="lazy" src="web/blossoms-01.jpg" alt="blossoms-01.jpg">
        <p>blossoms-01.jpg</p>
      </button>
      <button type="button" class="gallery-card" data-artwork="art-9">
        <img loading="lazy" src="web/blossoms-02.jpg" alt="blossoms-02.jpg">
        <p>blossoms-02.jpg</p>
      </button>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox fixed inset-0 z-50 items-center justify-center bg-black/90 p-2">
   <div class="relative max-w-5xl w-full mx-auto bg-neutral-900 rounded-xl overflow-hidden" style="max-height:calc(100vh - 16px);display:flex;flex-direction:column;">
    <button type="button" id="lightbox-close" class="absolute top-3 right-3 z-10 text-white/70 hover:text-white"> <i data-lucide="x" style="width:22px;height:22px;"></i> </button>
    <div style="display:flex;flex-direction:row;flex:1;min-height:0;overflow:hidden;">
     <div style="flex:1;min-width:0;background:#000;display:flex;align-items:center;justify-content:center;">
       <img id="lightbox-img" style="width:100%;height:100%;max-height:calc(100vh - 16px);object-fit:contain;" src="" alt="">
     </div>
     <div style="width:280px;flex-shrink:0;padding:20px;display:flex;flex-direction:column;overflow-y:auto;max-height:calc(100vh - 16px);">
      <h2 id="lightbox-title" class="font-bold text-neutral-100" style="font-size:15px;margin:0 0 12px;padding-right:28px;"></h2>
      <form id="comment-form" style="margin-bottom:12px;">
       <label data-template-id="comment-name-label" for="comment-name" class="canva-text block" style="color:rgb(163,163,163);font-size:12px;margin-bottom:4px;">Your Name</label>
       <input id="comment-name" type="text" class="w-full rounded bg-neutral-800 text-neutral-100 border border-neutral-700 focus:outline-none focus:border-neutral-500" style="padding:5px 8px;font-size:13px;margin-bottom:8px;" required="">
       <label data-template-id="comment-text-label" for="comment-text" class="canva-text block" style="color:rgb(163,163,163);font-size:12px;margin-bottom:4px;">Your Comment</label>
       <textarea id="comment-text" rows="2" class="w-full rounded bg-neutral-800 text-neutral-100 border border-neutral-700 focus:outline-none focus:border-neutral-500" style="padding:5px 8px;font-size:13px;margin-bottom:8px;" required=""></textarea>
       <button data-template-id="comment-submit-btn" type="submit" class="canva-button rounded font-semibold" style="background:rgb(225,29,72);color:#fff;font-size:13px;padding:6px 14px;">Submit</button>
      </form>
      <div id="comments-list" class="space-y-2 overflow-y-auto" style="flex:1;min-height:0;"></div>
      <p id="no-comments" class="text-neutral-500 italic text-sm hidden">No comments yet. Be the first!</p>
     </div>
    </div>
   </div>
  </div>

  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    let allComments = [];
    let currentArtwork = null;

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxTitle = document.getElementById('lightbox-title');
    const commentsList = document.getElementById('comments-list');
    const noComments = document.getElementById('no-comments');
    const commentForm = document.getElementById('comment-form');

    // Open lightbox
    document.querySelectorAll('.gallery-card').forEach(card => {
      card.addEventListener('click', () => {
        currentArtwork = card.dataset.artwork;
        const img = card.querySelector('img');
        const title = card.querySelector('p');
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxTitle.textContent = title.textContent;
        lightbox.classList.add('active');
        renderComments();
      });
    });

    // Close lightbox
    document.getElementById('lightbox-close').addEventListener('click', () => {
      lightbox.classList.remove('active');
      currentArtwork = null;
    });
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.classList.remove('active');
        currentArtwork = null;
      }
    });

    // Render comments for current artwork
    function renderComments() {
      const filtered = allComments.filter(c => c.artwork_id === currentArtwork);
      if (filtered.length === 0) {
        commentsList.innerHTML = '';
        noComments.classList.remove('hidden');
        return;
      }
      noComments.classList.add('hidden');
      commentsList.innerHTML = filtered.map(c => `
        <div class="bg-neutral-800 rounded p-3">
          <p class="text-neutral-300 text-sm font-semibold">${escapeHtml(c.author_name)}</p>
          <p class="text-neutral-400 text-sm mt-1">${escapeHtml(c.comment_text)}</p>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // Submit comment
    commentForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentArtwork) return;
      const name = document.getElementById('comment-name').value.trim();
      const text = document.getElementById('comment-text').value.trim();
      if (!name || !text) return;

      if (allComments.length >= 999) {
        noComments.textContent = 'Comment limit reached (999). Please remove some comments first.';
        noComments.classList.remove('hidden');
        return;
      }

      const btn = commentForm.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const result = await window.dataSdk.create({
        artwork_id: currentArtwork,
        author_name: name,
        comment_text: text,
        created_at: new Date().toISOString()
      });

      btn.disabled = false;
      btn.textContent = 'Submit Comment';

      if (result.isOk) {
        commentForm.reset();
      } else {
        noComments.textContent = 'Failed to submit comment. Please try again.';
        noComments.classList.remove('hidden');
      }
    });

    // Data SDK
    const dataHandler = {
      onDataChanged(data) {
        allComments = data;
        if (currentArtwork) renderComments();
      }
    };

    (async () => {
      const res = await window.dataSdk.init(dataHandler);
      if (!res.isOk) console.error('Data SDK init failed');
    })();

    lucide.createIcons();
  </script>

</body></html>
